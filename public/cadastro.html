<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/style.css"><title>Cadastro do Motorista · Massfix</title></head><body>
<div class="container">
<div class="topbar"><div class="brand-row"><div class="logo-badge">M</div><div class="brand-name">Criar cadastro</div></div><a href="/index.html">Inicio</a></div>
<div class="hero"><div class="badge">Cadastro do motorista</div><h2>Crie seu acesso</h2><p class="muted">Depois do cadastro, o motorista pode usar pelo site ou instalar no celular.</p></div>
<div class="card mt-16"><div>Nome</div><input class="input" id="nome"><div class="mt-16">CPF</div><input class="input" id="cpf" maxlength="11" oninput="this.value=this.value.replace(/[^0-9]/g,'')"><div class="mt-16">Placa</div><input class="input" id="placa"><div class="mt-16">Senha</div><input class="input" id="senha" type="password"><button class="btn btn-white mt-16" onclick="cadastrar()">Cadastrar</button></div></div>
<script>
async function cadastrar(){
 const r=await fetch('/cadastro',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome:nome.value,cpf:cpf.value,placa:placa.value,senha:senha.value})});
 const txt=await r.text();
 if(r.ok){ alert('Cadastro criado com sucesso.'); location='/login.html'; } else alert(txt||'Erro');
}
</script></body></html>
